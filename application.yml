spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# Shared security settings across services (same JWT secret everywhere)
jwt:
  secret: myverysecuresecretkeythatisatleast32characterslong!!
  expiration: 3600000

# Shared Eureka config (overrides per service if needed)
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: always
